# REDIS_URL Secret — shared by both services.
#
# DO NOT commit the real endpoint value. Create this Secret at deploy time from
# the Terraform output instead of applying this file as-is:
#
#   REDIS_URL=$(terraform -chdir=terraform output -raw redis_primary_endpoint)
#   kubectl create secret generic redis-credentials \
#     --namespace default \
#     --from-literal=REDIS_URL="$REDIS_URL"
#
# This manifest is kept only as a reference for the expected shape. The
# stringData value below is a placeholder and must be overridden.
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: default
type: Opaque
stringData:
  # Format: rediss://:<auth-token>@<elasticache-primary-endpoint>:6379
  REDIS_URL: "rediss://REPLACE_ME:6379"
