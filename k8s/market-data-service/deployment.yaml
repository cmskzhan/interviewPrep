# market-data-service: ServiceAccount (IRSA) + Deployment + Service
#
# Before applying, set two placeholders:
#   <AWS_ACCOUNT_ID>  and the image registry/tag
# The IRSA role ARN comes from: terraform output -raw market_data_service_role_arn
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: market-data-service
  namespace: default
  annotations:
    # From: terraform output -raw market_data_service_role_arn
    eks.amazonaws.com/role-arn: arn:aws:iam::<AWS_ACCOUNT_ID>:role/millenium-dev-market-data-service-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-service
  namespace: default
  labels:
    app: market-data-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: market-data-service
  template:
    metadata:
      labels:
        app: market-data-service
    spec:
      serviceAccountName: market-data-service
      containers:
        - name: market-data-service
          image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/millenium-market-data-service:latest
          ports:
            - containerPort: 8000
          env:
            # Injected from the redis-credentials Secret (ElastiCache endpoint)
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_URL
            - name: AWS_REGION
              value: us-east-1
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: market-data-service
  namespace: default
spec:
  selector:
    app: market-data-service
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
